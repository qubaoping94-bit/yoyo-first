name: Validate Youyou Inorganic Board Guide

on:
  push:
    paths:
      - "skill-packs/youyou-inorganic-board-guide/**"
  pull_request:
    paths:
      - "skill-packs/youyou-inorganic-board-guide/**"

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify skill pack
        shell: pwsh
        run: |
          Set-Location skill-packs/youyou-inorganic-board-guide
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify.ps1
