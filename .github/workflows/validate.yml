name: Validate Independent Skill Packs

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate every independent skill pack
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath "skill-packs" -Directory | ForEach-Object {
            $verify = Join-Path $_.FullName "scripts/verify.ps1"
            if (-not (Test-Path -LiteralPath $verify)) {
              throw "Missing verify script: $verify"
            }
            & $verify
          }

